<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Clienti - Car Rental System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🚗 Car Rental System</div>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="vehicles.html">Vehicule</a>
            <a href="customers.html" class="active">Clienti</a>
            <a href="contracts.html">Contracte</a>
            <a href="payments.html">Plati</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Clienti</h1>
            <button class="btn btn-primary" onclick="showAddModal()">+ Adauga Client</button>
        </div>

        <table class="table">
            <thead>
                <tr>
                    <th>Nume</th>
                    <th>Email</th>
                    <th>Telefon</th>
                    <th>Permis</th>
                    <th>Inchirieri</th>
                </tr>
            </thead>
            <tbody id="customersTable"></tbody>
        </table>
    </div>

    <div id="addModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Adauga Client</h2>
                <button onclick="hideModal()" class="close-btn">✕</button>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Prenume</label>
                    <input type="text" id="firstName" placeholder="Ion">
                </div>
                <div class="form-group">
                    <label>Nume</label>
                    <input type="text" id="lastName" placeholder="Popescu">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="ion@mail.com">
                </div>
                <div class="form-group">
                    <label>Telefon</label>
                    <input type="text" id="phone" placeholder="+37360000001">
                </div>
                <div class="form-group">
                    <label>Numar permis</label>
                    <input type="text" id="license" placeholder="MD123456">
                </div>
                <div class="form-group">
                    <label>Data nasterii</label>
                    <input type="date" id="dob">
                </div>
            </div>
            <button class="btn btn-primary" onclick="addCustomer()">Adauga Client</button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/customers.js"></script>
</body>
</html>
